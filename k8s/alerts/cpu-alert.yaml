apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-alert-rules
  namespace: monitoring
  labels:
    release: monitoring

spec:
  groups:
  - name: aiops.rules
    rules:

    - alert: HighPodCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="default"}[2m])) by (namespace, pod) > 0.8
      for: 10s
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected"
        description: "Pod CPU usage above 80%"

    - alert: HighMemoryUsage
      expr: sum(container_memory_working_set_bytes{namespace="default"}) by (pod) > 500000000
      for: 30s
      labels:
        severity: warning
      annotations:
        summary: "High Memory Usage"
        description: "Pod memory usage above threshold"

    - alert: PodCrashLoop
      expr: increase(kube_pod_container_status_restarts_total[5m]) > 3
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "Pod Crash Loop"
        description: "Container restarting repeatedly"

    - alert: PodOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "Pod OOMKilled"
        description: "Container killed due to memory exhaustion"