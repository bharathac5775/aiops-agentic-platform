apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-alert-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: aiops.rules
    rules:

    - alert: HighPodCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="default"}[2m])) by (pod) > 0.8
      for: 10s
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected"
        description: "Pod CPU usage above 80%"