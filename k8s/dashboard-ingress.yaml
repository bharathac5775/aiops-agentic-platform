apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiops-dashboard
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: aiops-dashboard.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aiops-dashboard
            port:
              number: 8501
