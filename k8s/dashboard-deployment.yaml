apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-dashboard
  template:
    metadata:
      labels:
        app: aiops-dashboard
    spec:
      containers:
      - name: aiops-dashboard
        image: bacdocker/aiops-dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        env:
        - name: AIOPS_API_BASE_URL
          value: http://ai-engine.default.svc.cluster.local:8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
