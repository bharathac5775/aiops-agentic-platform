apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      serviceAccountName: ai-engine-sa
      containers:
      - name: ai-engine
        image: bacdocker/ai-engine:v31
        ports:
        - containerPort: 8000
        env:
        - name: OLLAMA_MODEL
          value: llama3.1:8b
        - name: REMEDIATION_ALLOWED_NAMESPACES
          value: default,monitoring
        - name: AUTO_REMEDIATE
          value: "true"
        - name: AUTO_REMEDIATION_MODE
          value: "safe-auto"
        - name: AUTO_REMEDIATE_COOLDOWN_SECONDS
          value: "300"
        - name: AUTO_REMEDIATE_RETRY_WINDOW_SECONDS
          value: "1800"
        - name: AUTO_REMEDIATE_RETRY_LIMIT
          value: "3"
        - name: AUTO_MIN_CONFIDENCE_DEFAULT
          value: "0.85"
        - name: AUTO_MIN_CONFIDENCE_HIGHPODCPUUSAGE
          value: "0.90"
        - name: AUTO_MIN_CONFIDENCE_PODCRASHLOOP
          value: "0.90"
        - name: AUTO_MIN_CONFIDENCE_PODCRASHLOOPBACKOFF
          value: "0.90"
        - name: AUTO_MIN_CONFIDENCE_HIGHMEMORYUSAGE
          value: "0.93"
        - name: AUTO_MIN_CONFIDENCE_PODOOMKILLED
          value: "0.95"
        - name: AUTO_MIN_CONFIDENCE_PODIMAGEPULLBACKOFFPERSISTENT
          value: "0.93"
        - name: IMAGE_PULL_RETRY_THRESHOLD
          value: "3"
        - name: REMEDIATION_HPA_NAME
          value: stress-app-hpa
        - name: HPA_AUTO_MAX_INCREMENT
          value: "1"
        - name: HPA_AUTO_MAX_CAP
          value: "6"
        - name: INCIDENT_STORE_DIR
          value: /data/incidents
        - name: INCIDENT_MEMORY_BACKEND
          value: chroma
        - name: INCIDENT_MEMORY_PATH
          value: /data/incidents/chroma
        volumeMounts:
        - name: incident-history
          mountPath: /data
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
      volumes:
      - name: incident-history
        persistentVolumeClaim:
          claimName: ai-engine-incidents-pvc