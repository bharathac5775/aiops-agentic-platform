apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: bacdocker/ai-engine:v2
        ports:
        - containerPort: 8000